<svg width="720" height="620" viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">

  <!-- Background -->
  <rect width="720" height="620" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Quectel RM520N-GL — Modem Initialization Stack (Raspberry Pi 4)</text>

  <!-- ── LAYER LABELS ── -->
  <text x="18" y="108" fill="#8b949e" font-size="11" transform="rotate(-90,18,108)">Hardware</text>
  <text x="18" y="232" fill="#8b949e" font-size="11" transform="rotate(-90,18,232)">Kernel</text>
  <text x="18" y="370" fill="#8b949e" font-size="11" transform="rotate(-90,18,370)">Daemon</text>
  <text x="18" y="500" fill="#8b949e" font-size="11" transform="rotate(-90,18,500)">Network</text>

  <!-- Dividers -->
  <line x1="36" y1="152" x2="690" y2="152" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="36" y1="298" x2="690" y2="298" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="36" y1="444" x2="690" y2="444" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ══ LAYER 1: HARDWARE ══ -->

  <!-- Quectel modem -->
  <rect x="52" y="62" width="190" height="76" rx="8" fill="#2d1f05" stroke="#D29922" stroke-width="1"/>
  <text x="147" y="94" text-anchor="middle" fill="#e3b341" font-weight="600">Quectel RM520N-GL</text>
  <text x="147" y="114" text-anchor="middle" fill="#9e6a03" font-size="11">Sub-6 GHz 5G modem</text>
  <text x="147" y="130" text-anchor="middle" fill="#9e6a03" font-size="11">USB composite device</text>

  <!-- Arrow USB -->
  <line x1="242" y1="100" x2="296" y2="100" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="269" y="93" text-anchor="middle" fill="#8b949e" font-size="10">USB 3.0</text>

  <!-- Raspberry Pi 4 -->
  <rect x="296" y="62" width="170" height="76" rx="8" fill="#0d2b1f" stroke="#3fb950" stroke-width="1"/>
  <text x="381" y="94" text-anchor="middle" fill="#3fb950" font-weight="600">Raspberry Pi 4</text>
  <text x="381" y="114" text-anchor="middle" fill="#26a641" font-size="11">USB host controller</text>
  <text x="381" y="130" text-anchor="middle" fill="#26a641" font-size="11">Linux kernel 5.x</text>

  <!-- ══ LAYER 2: KERNEL DEVICES ══ -->

  <!-- ttyUSB0-3 -->
  <rect x="52" y="168" width="175" height="112" rx="8" fill="#1a1338" stroke="#8957e5" stroke-width="1"/>
  <text x="139" y="198" text-anchor="middle" fill="#bc8cff" font-weight="600">/dev/ttyUSB0–3</text>
  <text x="139" y="218" text-anchor="middle" fill="#7c4dff" font-size="11">Virtual COM ports</text>
  <text x="139" y="236" text-anchor="middle" fill="#7c4dff" font-size="11">AT commands</text>
  <text x="139" y="254" text-anchor="middle" fill="#7c4dff" font-size="11">GPS, diagnostics</text>
  <text x="139" y="272" text-anchor="middle" fill="#7c4dff" font-size="11">Text protocol</text>

  <!-- cdc-wdm0 -->
  <rect x="254" y="168" width="175" height="112" rx="8" fill="#1f1007" stroke="#f0883e" stroke-width="1"/>
  <text x="341" y="198" text-anchor="middle" fill="#f0883e" font-weight="600">/dev/cdc-wdm0</text>
  <text x="341" y="218" text-anchor="middle" fill="#d9730d" font-size="11">QMI control channel</text>
  <text x="341" y="236" text-anchor="middle" fill="#d9730d" font-size="11">Binary protocol</text>
  <text x="341" y="254" text-anchor="middle" fill="#d9730d" font-size="11">Register, connect</text>
  <text x="341" y="272" text-anchor="middle" fill="#d9730d" font-size="11">Query IP from operator</text>

  <!-- wwan0 -->
  <rect x="456" y="168" width="175" height="112" rx="8" fill="#051520" stroke="#388bfd" stroke-width="1"/>
  <text x="543" y="198" text-anchor="middle" fill="#58a6ff" font-weight="600">wwan0</text>
  <text x="543" y="218" text-anchor="middle" fill="#1f6feb" font-size="11">Network interface</text>
  <text x="543" y="236" text-anchor="middle" fill="#1f6feb" font-size="11">Data traffic only</text>
  <text x="543" y="254" text-anchor="middle" fill="#1f6feb" font-size="11">Created by kernel</text>
  <text x="543" y="272" text-anchor="middle" fill="#1f6feb" font-size="11">No IP by default</text>

  <!-- Arrows: RPi → kernel devices -->
  <line x1="350" y1="138" x2="180" y2="168" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="370" y1="138" x2="341" y2="168" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="390" y1="138" x2="510" y2="168" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ══ LAYER 3: MODEMMANAGER ══ -->

  <!-- ModemManager box -->
  <rect x="52" y="314" width="310" height="112" rx="8" fill="#0d2010" stroke="#3fb950" stroke-width="1"/>
  <text x="207" y="344" text-anchor="middle" fill="#3fb950" font-weight="600">ModemManager</text>
  <text x="207" y="364" text-anchor="middle" fill="#26a641" font-size="11">mmcli -m 0 --simple-connect="apn=internet"</text>
  <text x="207" y="382" text-anchor="middle" fill="#26a641" font-size="11">Sends QMI requests via /dev/cdc-wdm0</text>
  <text x="207" y="400" text-anchor="middle" fill="#26a641" font-size="11">Registers on Orange network, gets IP</text>
  <text x="207" y="418" text-anchor="middle" fill="#26a641" font-size="11">Stops here — does NOT configure wwan0</text>

  <!-- Bearer box -->
  <rect x="390" y="314" width="245" height="112" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="512" y="344" text-anchor="middle" fill="#e6edf3" font-weight="600">Bearer object</text>
  <text x="512" y="364" text-anchor="middle" fill="#8b949e" font-size="11">IP:      10.71.22.153/30</text>
  <text x="512" y="382" text-anchor="middle" fill="#8b949e" font-size="11">Gateway: 10.71.22.154</text>
  <text x="512" y="400" text-anchor="middle" fill="#8b949e" font-size="11">DNS:     from operator</text>
  <text x="512" y="418" text-anchor="middle" fill="#8b949e" font-size="11">Stored, not applied</text>

  <!-- MM ← cdc-wdm0 -->
  <line x1="300" y1="280" x2="265" y2="314" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="315" y="302" fill="#8b949e" font-size="10">QMI</text>

  <!-- MM → Bearer -->
  <line x1="362" y1="370" x2="388" y2="370" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ══ LAYER 4: NETWORK SETUP ══ -->

  <!-- ip link / ip addr -->
  <rect x="52" y="460" width="290" height="112" rx="8" fill="#051520" stroke="#388bfd" stroke-width="1"/>
  <text x="197" y="490" text-anchor="middle" fill="#58a6ff" font-weight="600">Manual interface setup</text>
  <text x="197" y="512" text-anchor="middle" fill="#1f6feb" font-size="11">ip link set wwan0 up</text>
  <text x="197" y="530" text-anchor="middle" fill="#1f6feb" font-size="11">ip addr add 10.71.22.153/30 dev wwan0</text>
  <text x="197" y="548" text-anchor="middle" fill="#1f6feb" font-size="11">ip route add default via 10.71.22.154 \</text>
  <text x="197" y="564" text-anchor="middle" fill="#1f6feb" font-size="11">  dev wwan0 metric 700</text>

  <!-- Policy routing -->
  <rect x="368" y="460" width="290" height="112" rx="8" fill="#1f0b07" stroke="#f0883e" stroke-width="1"/>
  <text x="513" y="490" text-anchor="middle" fill="#f0883e" font-weight="600">Policy routing (table 100)</text>
  <text x="513" y="512" text-anchor="middle" fill="#d9730d" font-size="11">ip rule add from 10.71.22.153 table 100</text>
  <text x="513" y="530" text-anchor="middle" fill="#d9730d" font-size="11">ip route add default via 10.71.22.154 \</text>
  <text x="513" y="548" text-anchor="middle" fill="#d9730d" font-size="11">  dev wwan0 table 100</text>
  <text x="513" y="566" text-anchor="middle" fill="#d9730d" font-size="11">Ensures src IP always exits via wwan0</text>

  <!-- Bearer → ip setup (dashed) -->
  <line x1="512" y1="426" x2="260" y2="460" stroke="#8b949e" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="410" y="447" text-anchor="middle" fill="#8b949e" font-size="10">read IP from here</text>

  <!-- ip setup → policy -->
  <line x1="342" y1="516" x2="366" y2="516" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>

  <!-- wwan0 ↓ to ip setup (dashed) -->
  <line x1="543" y1="280" x2="230" y2="460" stroke="#388bfd" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
